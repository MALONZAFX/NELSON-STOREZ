<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nelson Storez</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --r:#C8102E;--rh:#a50d25;--rf:rgba(200,16,46,0.08);
  --k:#0c0c0c;--s1:#161616;--s2:#1e1e1e;--s3:#282828;
  --w:#f0f0f0;--tx:#d0d0d0;--mu:#666;--mu2:#444;
  --go:#C8A84B;--gn:#1a7a3c;--gnb:#22a050;
  --b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);
}
html{scroll-behavior:smooth;font-size:14px}
body{font-family:'DM Sans',sans-serif;background:var(--k);color:var(--tx);overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.page{display:none;min-height:100vh}.page.active{display:block}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:900;height:58px;background:rgba(12,12,12,0.97);border-bottom:1px solid var(--b);backdrop-filter:blur(20px);display:flex;align-items:center;padding:0 32px;gap:0}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:var(--w);cursor:pointer;display:flex;align-items:center;gap:8px;margin-right:32px;white-space:nowrap;letter-spacing:-0.3px}
.brand-dot{width:6px;height:6px;border-radius:50%;background:var(--r);flex-shrink:0}
.nls{display:flex;gap:1px}
.nl{color:var(--mu);font-size:0.83rem;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.nl:hover{color:var(--w);background:rgba(255,255,255,0.04)}.nl.on{color:var(--w)}
.nr{display:flex;align-items:center;gap:7px;margin-left:auto}
.sw{position:relative;display:flex;align-items:center}
.si{position:absolute;left:10px;color:var(--mu);font-size:0.72rem;pointer-events:none}
.ns{background:var(--s2);border:1px solid var(--b);color:var(--w);padding:7px 12px 7px 30px;border-radius:7px;font-size:0.82rem;font-family:'DM Sans',sans-serif;width:200px;outline:none;transition:border .15s,width .2s}
.ns:focus{border-color:var(--b2);width:240px}.ns::placeholder{color:var(--mu)}
.npill{background:var(--s2);border:1px solid var(--b);color:var(--mu);padding:6px 14px;border-radius:7px;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.npill:hover{border-color:var(--b2);color:var(--w)}
.cib{background:var(--r);border:none;color:white;width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.85rem;transition:background .15s;position:relative}
.cib:hover{background:var(--rh)}
.cbdg{position:absolute;top:-5px;right:-5px;background:var(--w);color:var(--k);font-size:0.55rem;font-weight:800;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* HERO */
.hero{padding-top:58px;min-height:92vh;background:var(--k);display:flex;align-items:center;border-bottom:1px solid var(--b);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 70% 50%, rgba(200,16,46,0.06) 0%, transparent 65%),radial-gradient(ellipse at 10% 80%, rgba(200,168,75,0.04) 0%, transparent 50%)}
.hero-in{max-width:1100px;margin:0 auto;padding:0 32px;position:relative;z-index:1;width:100%}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:0.7rem;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--mu);margin-bottom:20px}
.hero-tag-line{width:22px;height:1px;background:var(--r)}
.hero-h{font-family:'Syne',sans-serif;font-size:clamp(2.6rem,4.2vw,3.8rem);font-weight:800;line-height:1.08;letter-spacing:-1.5px;color:var(--w);margin-bottom:16px}
.hero-h em{font-style:italic;color:var(--go);font-weight:700}.hero-h .hr{color:var(--r)}
.hero-p{font-size:0.95rem;color:var(--mu);line-height:1.75;max-width:500px;margin-bottom:30px;font-weight:300}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:48px}
.btn-r{background:var(--r);color:white;border:none;padding:11px 24px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:7px}
.btn-r:hover{background:var(--rh)}
.btn-o{background:transparent;color:var(--mu);border:1px solid var(--b2);padding:10px 22px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn-o:hover{border-color:rgba(255,255,255,0.2);color:var(--w)}
.hero-stats{display:flex;gap:0;border-top:1px solid var(--b);padding-top:28px}
.hst{padding:0 32px 0 0;margin-right:32px;border-right:1px solid var(--b)}
.hst:last-child{border-right:none}
.hst-v{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:var(--w);letter-spacing:-0.8px}
.hst-l{font-size:0.68rem;color:var(--mu);margin-top:2px;letter-spacing:0.5px}

/* STRIP */
.strip{background:var(--s1);border-bottom:1px solid var(--b);padding:16px 32px}
.strip-in{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.sti{display:flex;align-items:center;gap:11px;padding:0 20px;border-right:1px solid var(--b)}
.sti:first-child{padding-left:0}.sti:last-child{border-right:none}
.sti-ic{width:34px;height:34px;border-radius:7px;background:var(--s2);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;color:var(--mu);font-size:0.78rem;flex-shrink:0}
.sti-t{font-size:0.82rem;font-weight:600;color:var(--tx);margin-bottom:1px}.sti-s{font-size:0.7rem;color:var(--mu)}

/* SECTIONS */
.sec{padding:52px 32px;max-width:1100px;margin:0 auto}
.sec-bg{background:var(--s1);border-top:1px solid var(--b);border-bottom:1px solid var(--b)}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.sec-ttl{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--w);letter-spacing:-0.4px}
.sec-ttl .ac{color:var(--r)}
.sec-lnk{font-size:0.76rem;color:var(--mu);cursor:pointer;display:flex;align-items:center;gap:4px;transition:color .15s}
.sec-lnk:hover{color:var(--w)}

/* CHIPS */
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{background:var(--s2);border:1px solid var(--b);color:var(--mu);padding:7px 14px;border-radius:20px;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.chip i{font-size:0.68rem;opacity:.8}.chip:hover{border-color:var(--b2);color:var(--w)}.chip.on{background:var(--r);border-color:var(--r);color:white}

/* PRODUCTS */
.ptbar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.pfils{display:flex;gap:5px;flex-wrap:wrap}
.fp{background:var(--s2);border:1px solid var(--b);color:var(--mu);padding:6px 14px;border-radius:20px;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all .15s}
.fp:hover{color:var(--w);border-color:var(--b2)}.fp.on{background:var(--r);border-color:var(--r);color:white}
.psort{background:var(--s2);border:1px solid var(--b);color:var(--tx);padding:6px 10px;border-radius:7px;font-size:0.78rem;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;margin-left:auto}
.pcnt{font-size:0.72rem;color:var(--mu);margin-left:5px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}

/* PRODUCT CARD */
.pc{background:var(--s1);border:1px solid var(--b);border-radius:11px;overflow:hidden;cursor:pointer;position:relative;transition:transform .2s,border-color .2s,box-shadow .2s}
.pc:hover{transform:translateY(-3px);border-color:var(--b2);box-shadow:0 10px 28px rgba(0,0,0,0.45)}
.pc-bdg{position:absolute;top:9px;left:9px;z-index:2;padding:3px 9px;border-radius:4px;font-size:0.6rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.bdg-sale{background:var(--r);color:white}.bdg-new{background:var(--gn);color:white}.bdg-hot{background:var(--go);color:#1a1000}
.pc-img{width:100%;height:175px;object-fit:cover;display:block;transition:transform .3s}
.pc:hover .pc-img{transform:scale(1.04)}
.pc-body{padding:12px}
.pc-cat{font-size:0.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:.9px;margin-bottom:4px}
.pc-name{font-size:0.88rem;font-weight:600;margin-bottom:4px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--w)}
.pc-stars{font-size:0.65rem;color:var(--go);margin-bottom:9px;display:flex;align-items:center;gap:3px}
.pc-stars span{color:var(--mu);font-size:0.62rem}
.pc-foot{display:flex;align-items:center;justify-content:space-between;gap:7px}
.pc-old{font-size:0.65rem;color:var(--mu);text-decoration:line-through}
.pc-price{font-size:0.95rem;font-weight:700;color:var(--w)}
.pc-add{background:var(--s3);border:1px solid var(--b);color:var(--mu);width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.72rem;transition:all .15s;flex-shrink:0}
.pc-add:hover,.pc-add.active{background:var(--r);border-color:var(--r);color:white}
.no-res{grid-column:1/-1;text-align:center;padding:56px;color:var(--mu)}
.no-res i{font-size:2rem;display:block;margin-bottom:12px;opacity:.18}.no-res p{font-size:0.85rem}

/* MODAL */
.ov{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.82);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.pm{background:var(--s1);border:1px solid var(--b2);border-radius:13px;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;animation:pop .2s ease;position:relative}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.pm-grid{display:grid;grid-template-columns:1fr 1fr}
.pm-img{width:100%;height:100%;min-height:320px;object-fit:cover;border-radius:13px 0 0 13px;display:block}
.pm-body{padding:28px 24px;display:flex;flex-direction:column}
.pm-x{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.6);border:1px solid var(--b);color:var(--mu);width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.75rem;z-index:5;transition:all .15s}
.pm-x:hover{background:var(--r);border-color:var(--r);color:white}
.pm-cat{font-size:0.62rem;color:var(--mu);text-transform:uppercase;letter-spacing:1.1px;margin-bottom:6px}
.pm-name{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--w);margin-bottom:8px;line-height:1.15;letter-spacing:-.4px}
.pm-stars{display:flex;align-items:center;gap:5px;margin-bottom:12px;font-size:0.75rem}
.pm-sv{color:var(--go)}.pm-st{color:var(--mu)}
.pm-stk{display:inline-flex;align-items:center;gap:4px;font-size:0.65rem;padding:3px 9px;border-radius:4px;margin-bottom:12px}
.stk-ok{background:rgba(26,122,60,.14);color:#4caf50;border:1px solid rgba(26,122,60,.28)}
.stk-lo{background:rgba(200,168,75,.14);color:var(--go);border:1px solid rgba(200,168,75,.28)}
.pm-desc{font-size:0.83rem;color:var(--mu);line-height:1.68;margin-bottom:16px;flex:1}
.pm-meta{font-size:0.7rem;color:var(--mu2);margin-bottom:16px;display:flex;gap:14px}
.pm-pr{display:flex;align-items:baseline;gap:10px;margin-bottom:18px}
.pm-price{font-family:'Syne',sans-serif;font-size:1.55rem;font-weight:800;color:var(--w)}
.pm-old{font-size:0.82rem;color:var(--mu);text-decoration:line-through}
.pm-disc{font-size:0.68rem;color:var(--r);font-weight:700;padding:2px 6px;background:var(--rf);border-radius:3px}
.qty-r{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.qty-l{font-size:0.74rem;color:var(--mu);min-width:26px}
.qty-box{display:flex;align-items:center;background:var(--s2);border:1px solid var(--b);border-radius:7px;overflow:hidden}
.qb{background:none;border:none;color:var(--mu);width:32px;height:32px;cursor:pointer;font-size:0.68rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.qb:hover{background:var(--s3);color:var(--w)}
.qn{font-size:0.88rem;font-weight:700;min-width:30px;text-align:center}
.qty-tot{font-size:0.85rem;font-weight:700;color:var(--go);margin-left:4px}
.pm-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-g{background:var(--gn);color:white;border:none;padding:10px 20px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:0.83rem;font-weight:600;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:6px}
.btn-g:hover{background:var(--gnb)}

/* CART */
.cov{display:none;position:fixed;inset:0;z-index:950;background:rgba(0,0,0,0.5)}.cov.open{display:block}
.cdrw{position:fixed;top:0;right:-420px;width:400px;height:100vh;background:var(--s1);border-left:1px solid var(--b);z-index:960;transition:right .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.cdrw.open{right:0}
.chd{padding:18px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.chd h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--w)}
.chr{display:flex;align-items:center;gap:7px}
.cnbdg{background:var(--s2);border:1px solid var(--b);color:var(--mu);font-size:0.68rem;padding:3px 9px;border-radius:11px}
.icb{background:none;border:1px solid var(--b);color:var(--mu);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.7rem;transition:all .15s}
.icb:hover{border-color:var(--b2);color:var(--w)}
.cbd{flex:1;overflow-y:auto;padding:12px}
.cemp{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--mu);gap:10px;text-align:center}
.cemp i{font-size:2.2rem;opacity:.12}.cemp p{font-size:0.82rem}
.ci{display:flex;gap:10px;padding:11px;background:var(--s2);border:1px solid var(--b);border-radius:9px;margin-bottom:9px;align-items:center}
.ci-img{width:54px;height:54px;object-fit:cover;border-radius:7px;flex-shrink:0}
.ci-inf{flex:1;min-width:0}
.ci-nm{font-size:0.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;color:var(--w)}
.ci-cat{font-size:0.63rem;color:var(--mu);margin-bottom:6px}
.ci-qty{display:flex;align-items:center;gap:6px}
.cqb{background:none;border:1px solid var(--b);color:var(--mu);width:22px;height:22px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.58rem;transition:all .15s}
.cqb:hover{border-color:var(--r);color:var(--r)}
.cqn{font-size:0.8rem;font-weight:700;min-width:18px;text-align:center}
.ci-r{display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.ci-pr{font-size:0.85rem;font-weight:700;white-space:nowrap;color:var(--w)}
.cdl{background:none;border:none;color:var(--mu2);cursor:pointer;font-size:0.7rem;padding:2px;transition:color .15s}
.cdl:hover{color:var(--r)}
.cft{padding:16px 20px;border-top:1px solid var(--b)}
.ctots{margin-bottom:14px}
.ct{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--mu);margin-bottom:6px}
.ct.big{font-size:0.95rem;font-weight:700;color:var(--w);border-top:1px solid var(--b);padding-top:9px;margin-top:3px}
.bchk{width:100%;background:var(--r);border:none;color:white;padding:12px;border-radius:8px;font-size:0.88rem;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:7px;font-family:'DM Sans',sans-serif}
.bchk:hover{background:var(--rh)}
.bcnt{width:100%;background:none;border:none;color:var(--mu);font-size:0.76rem;cursor:pointer;margin-top:8px;padding:4px;transition:color .15s;font-family:'DM Sans',sans-serif}
.bcnt:hover{color:var(--tx)}

/* CHECKOUT */
.cop{padding-top:58px}
.cow{max-width:1040px;margin:0 auto;padding:38px 32px}
.cobk{display:inline-flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--mu);cursor:pointer;margin-bottom:22px;transition:color .15s}
.cobk:hover{color:var(--w)}
.cott{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:var(--w);letter-spacing:-.4px;margin-bottom:5px}
.cosub{font-size:0.8rem;color:var(--mu);margin-bottom:28px}
.cogrid{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}
.fcard{background:var(--s1);border:1px solid var(--b);border-radius:11px;padding:22px;margin-bottom:14px}
.fct{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;color:var(--w);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.fct i{color:var(--r);font-size:0.8rem}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{margin-bottom:12px}.fg:last-child{margin-bottom:0}
.fg label{display:block;font-size:0.7rem;color:var(--mu);margin-bottom:5px;font-weight:500;letter-spacing:.2px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--w);padding:9px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.83rem;outline:none;transition:border .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--b2)}
.fg textarea{resize:vertical;min-height:72px}.fg select option{background:var(--s2)}
.pays{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pay{background:var(--s2);border:2px solid var(--b);border-radius:9px;padding:13px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s}
.pay.on{border-color:var(--r);background:var(--rf)}
.pay i{font-size:1rem;color:var(--mu);width:20px;text-align:center;transition:color .15s}.pay.on i{color:var(--r)}
.pay-n{font-size:0.8rem;font-weight:600;color:var(--w)}.pay-s{font-size:0.65rem;color:var(--mu);margin-top:1px}
.pay input{display:none}
.osum{background:var(--s1);border:1px solid var(--b);border-radius:11px;padding:20px;position:sticky;top:70px}
.ostt{font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:800;color:var(--w);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.oscnt{font-size:0.68rem;color:var(--mu);font-weight:400;font-family:'DM Sans',sans-serif}
.si{display:flex;gap:9px;margin-bottom:11px;align-items:center}
.si img{width:44px;height:44px;object-fit:cover;border-radius:6px;flex-shrink:0}
.si-i{flex:1;min-width:0}.si-n{font-size:0.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--w)}
.si-s{font-size:0.65rem;color:var(--mu)}.si-p{font-size:0.83rem;font-weight:700;white-space:nowrap;color:var(--w)}
.sisc{max-height:220px;overflow-y:auto;margin-bottom:14px}
.sdiv{border:none;border-top:1px solid var(--b);margin:10px 0}
.sr{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--mu);margin-bottom:7px}
.sr.big{font-size:0.95rem;font-weight:700;color:var(--w);padding-top:5px}
.pbtn{width:100%;background:var(--r);border:none;color:white;padding:12px;border-radius:8px;font-size:0.88rem;font-weight:600;cursor:pointer;transition:background .15s;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:7px;font-family:'DM Sans',sans-serif}
.pbtn:hover{background:var(--rh)}
